<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>なわとびメトロノーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="title-row">
        <h1>なわとびメトロノーム</h1>
        <span class="app-version">Ver0.05</span>
      </div>
    </header>

    <main class="app-main">
      <p class="mobile-sound-notice">スマートフォンの場合はマナーモードを解除してください。</p>

      <!-- 全体時間 -->
      <section class="card">
        <h2 class="card-title">全体時間</h2>
        <div class="total-time-row">
          <input id="totalSec" type="number" class="input-number"
                 value="30" min="1" max="300" inputmode="numeric">
          <span class="unit">秒</span>
        </div>
      </section>

      <!-- セグメント設定 -->
      <section class="card">
        <h2 class="card-title">セグメント設定</h2>
        <div id="segmentList" class="segment-list"></div>
        <button id="addSegBtn" class="btn btn-add">＋ セグメント追加</button>
      </section>

      <!-- タイムライン -->
      <section class="card">
        <h2 class="card-title">タイムライン</h2>
        <div class="timeline-wrap">
          <div id="timelineBar" class="timeline-bar">
            <div id="timelineSegs" class="timeline-segs"></div>
            <canvas id="timelineCanvas" class="timeline-canvas-overlay"></canvas>
            <div id="playhead" class="playhead" hidden></div>
          </div>
          <div id="timelineLabels" class="timeline-labels"></div>
        </div>
        <div id="playInfo" class="play-info" hidden>
          <span id="infoJumps"></span>
          <span id="infoRemain"></span>
          <span id="infoSeg"></span>
        </div>
      </section>

      <!-- コントロール -->
      <section class="card controls-card">
        <div class="controls-row">
          <button id="playBtn" class="btn btn-play">▶ 再生</button>
          <button id="stopBtn" class="btn btn-stop" disabled>⏹ 停止</button>
        </div>
        <button id="exportBtn" class="btn btn-export">⬇ MP3ダウンロード</button>
        <div id="exportStatus" class="export-status" hidden></div>
      </section>

      <!-- オプション（アコーディオン） -->
      <details class="card options-accordion">
        <summary class="options-summary">
          <span class="options-summary-label">オプション</span>
          <span class="options-arrow">›</span>
        </summary>
        <div class="options-body">

          <!-- アナウンス設定 -->
          <div class="option-section">
            <h3 class="option-section-title">アナウンス設定</h3>
            <div class="setting-label-row">
              <span class="setting-label">開始アナウンス</span>
              <span class="setting-hint">再生前に読み上げるテキスト</span>
            </div>
            <textarea id="announcementText" class="announcement-input"
                      placeholder="例: Single Rope Speed Sprint 30 seconds" rows="2">Single Rope</textarea>
            <div class="setting-divider"></div>
            <div class="setting-row">
              <label class="setting-label" for="countdownSec">カウントダウン</label>
              <div class="input-row">
                <input id="countdownSec" type="number" class="input-number input-sm"
                       value="3" min="0" max="10" step="1" inputmode="numeric">
                <span class="unit">秒</span>
              </div>
            </div>
            <p class="setting-hint" style="margin-top:4px">例：3秒 → Three, Two, One, BEEP</p>
            <div class="setting-divider"></div>
            <div class="setting-row">
              <span class="setting-label">時間アナウンス</span>
              <button id="addTimeAnnBtn" class="btn-sm-primary">＋ 追加</button>
            </div>
            <div id="timeAnnList" class="time-ann-list"></div>
          </div>

          <div class="option-divider"></div>

          <!-- 機能 ON / OFF -->
          <div class="option-section">
            <h3 class="option-section-title">機能 ON / OFF</h3>
            <div class="toggle-list">
              <label class="toggle-row" for="togAnnouncement">
                <div class="toggle-info">
                  <span class="toggle-name">開始アナウンス読み上げ</span>
                  <span class="toggle-desc">カウントダウン前にテキストを読み上げ</span>
                </div>
                <div class="toggle-wrap">
                  <input type="checkbox" id="togAnnouncement" checked>
                  <span class="tog-slider"></span>
                </div>
              </label>
              <label class="toggle-row" for="togCountdown">
                <div class="toggle-info">
                  <span class="toggle-name">カウントダウン音声</span>
                  <span class="toggle-desc">Three, Two, One の読み上げ</span>
                </div>
                <div class="toggle-wrap">
                  <input type="checkbox" id="togCountdown" checked>
                  <span class="tog-slider"></span>
                </div>
              </label>
              <label class="toggle-row" for="togBeepStart">
                <div class="toggle-info">
                  <span class="toggle-name">スタート BEEP</span>
                  <span class="toggle-desc">最初のビートの合図音</span>
                </div>
                <div class="toggle-wrap">
                  <input type="checkbox" id="togBeepStart" checked>
                  <span class="tog-slider"></span>
                </div>
              </label>
              <label class="toggle-row" for="togBeepTransition">
                <div class="toggle-info">
                  <span class="toggle-name">切替 BEEP</span>
                  <span class="toggle-desc">セグメント切り替わりの合図音</span>
                </div>
                <div class="toggle-wrap">
                  <input type="checkbox" id="togBeepTransition" checked>
                  <span class="tog-slider"></span>
                </div>
              </label>
              <label class="toggle-row" for="togBeepEnd">
                <div class="toggle-info">
                  <span class="toggle-name">終了 BEEP</span>
                  <span class="toggle-desc">メトロノーム終了の合図音</span>
                </div>
                <div class="toggle-wrap">
                  <input type="checkbox" id="togBeepEnd" checked>
                  <span class="tog-slider"></span>
                </div>
              </label>
              <label class="toggle-row" for="togVoiceCount">
                <div class="toggle-info">
                  <span class="toggle-name">回数アナウンス</span>
                  <span class="toggle-desc">スタート・切替時に回数を英語で読上げ</span>
                </div>
                <div class="toggle-wrap">
                  <input type="checkbox" id="togVoiceCount" checked>
                  <span class="tog-slider"></span>
                </div>
              </label>
              <label class="toggle-row" for="togVoiceTime">
                <div class="toggle-info">
                  <span class="toggle-name">時間アナウンス</span>
                  <span class="toggle-desc">指定した時間を英語で読上げ</span>
                </div>
                <div class="toggle-wrap">
                  <input type="checkbox" id="togVoiceTime" checked>
                  <span class="tog-slider"></span>
                </div>
              </label>
            </div>
          </div>

          <div class="option-divider"></div>

          <!-- クリック音 -->
          <div class="option-section">
            <h3 class="option-section-title">クリック音</h3>
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="clickSound" value="electronic" checked>
                <span>電子音</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="clickSound" value="marimba">
                <span>木琴風</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="clickSound" value="simple">
                <span>シンプル</span>
              </label>
            </div>
          </div>

        </div>
      </details>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
  <script src="metronome.js"></script>
  <script src="export.js"></script>
  <script src="app.js"></script>
</body>
</html>
